<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#021544"/>
      <stop offset="100%" stop-color="#01355A"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17A3A4"/>
      <stop offset="100%" stop-color="#13778d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Antenna -->
  <line x1="16" y1="7" x2="16" y2="3.5" stroke="#17A3A4" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="2.5" r="1.8" fill="url(#teal)"/>

  <!-- Head -->
  <rect x="6.5" y="7.5" width="19" height="16" rx="3.5" fill="url(#bg)" stroke="#17A3A4" stroke-width="1.5"/>

  <!-- Eyes (glowing rectangles) -->
  <rect x="8.5" y="11.5" width="5.5" height="3.5" rx="1.5" fill="url(#teal)"/>
  <rect x="18" y="11.5" width="5.5" height="3.5" rx="1.5" fill="url(#teal)"/>

  <!-- Mouth / grill lines -->
  <rect x="10" y="18" width="12" height="1.5" rx="0.75" fill="#17A3A4" opacity="0.9"/>
  <rect x="12" y="20.5" width="8" height="1" rx="0.5" fill="#17A3A4" opacity="0.45"/>
</svg>
